version: '3.8'

services:
  # --- Justice Core Backend Service ---
  justice-core-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: justice-core-backend
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - MONGODB_URI=mongodb://mongodb:27017/JusticeCore
      - JWT_SECRET=justice-core-secret-key-2025
      # Add other essential env variables if needed
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - justice-core-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- MongoDB Database Service ---
  mongodb:
    image: mongo:6.0
    container_name: justice-core-mongodb
    ports:
      - "27017:27017" # Exposed for local tool access (like Compass)
    volumes:
      - mongo-data:/data/db
    networks:
      - justice-core-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MongoDB Express (UI for managing MongoDB) ---
  mongo-express:
    image: mongo-express
    container_name: justice-core-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - justice-core-network

volumes:
  mongo-data:
    driver: local

networks:
  justice-core-network:
    driver: bridge